<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiragana Bingo</title>
<style>
body {
  font-family: Arial, sans-serif;
  background:#f9f9f9;
  text-align:center;
  padding:6px;   /* ← 減らす */
  margin:0;
}

h1 {
  font-size: 24px;   /* ← 少し小さく */
  margin:8px 0;
}

p {
  font-size: 13px;
  margin:6px 0 10px;
}

.board {
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:5px;                /* ← 少し詰める */
  width: 92vw;            /* ← ここ重要（少し余白を残す） */
  max-width: 320px;       /* ← 小さめに制限 */
  margin:10px auto;
}

.cell {
  border:1.5px solid #ccc;   /* ← 少し細く */
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: min(5.5vw, 22px);  /* ← 文字も少し小さく */
  cursor:pointer;
  position:relative;
}

.cell.marked::after {
  content:"";
  position:absolute;
  width:65%;
  height:65%;
  border:3px solid red;   /* ← 細く */
  border-radius:50%;
}

button {
  margin:3px;
  padding:8px 12px;      /* ← コンパクト */
  font-size:13px;
  border-radius:18px;
}

.free {
  background:#eee;
}
</style>
</head>
<body>

<h1>Hiragana Bingo</h1>
<p>Press "Start" to generate a random 5×5 bingo card.<br>Tap a cell to mark it.</p>

<button onclick="newCard()">Start</button>
<button onclick="resetMarks()">Reset Marks</button>

<div id="board" class="board"></div>

<div id="bingoMessage" style="font-size:28px;color:red;font-weight:bold;margin-top:10px;display:none;">BINGO!</div>

<script>
const kana = [
"あ","い","う","え","お",
"か","き","く","け","こ",
"さ","し","す","せ","そ",
"た","ち","つ","て","と",
"な","に","ぬ","ね","の",
"は","ひ","ふ","へ","ほ",
"ま","み","む","め","も",
"や","ゆ","よ",
"ら","り","る","れ","ろ",
"わ","を","ん",
"が","ぎ","ぐ","げ","ご",
"ざ","じ","ず","ぜ","ぞ",
"だ","ぢ","づ","で","ど",
"ば","び","ぶ","べ","ぼ",
"ぱ","ぴ","ぷ","ぺ","ぽ"
];

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function generate(){
  let picked = shuffle([...kana]).slice(0,24);
  let grid=[];
  let i=0;
  for(let r=0;r<5;r++){
    for(let c=0;c<5;c++){
      if(r===2 && c===2){
        grid.push({text:"FREE",free:true});
      }else{
        grid.push({text:picked[i],free:false});
        i++;
      }
    }
  }
  return grid;
}

function render(grid){
  const board=document.getElementById("board");
  board.innerHTML="";
  grid.forEach(cell=>{
    const div=document.createElement("div");
    div.className="cell"+(cell.free?" free marked":"");
    div.textContent=cell.text;
    if(!cell.free){
      div.onclick = () => {
      div.classList.toggle("marked");
      if (checkBingo()) {
        document.getElementById("bingoMessage").style.display = "block";
      }
    };
    }
    board.appendChild(div);
  });
}

function checkBingo() {
  const cells = document.querySelectorAll(".cell");
  let grid = [];
  for (let i = 0; i < 5; i++) {
    grid[i] = [];
    for (let j = 0; j < 5; j++) {
      const index = i * 5 + j;
      grid[i][j] = cells[index].classList.contains("marked");
    }
  }

  for (let i = 0; i < 5; i++) {
    if (grid[i].every(v => v)) return true;
    if (grid.map(row => row[i]).every(v => v)) return true;
  }

  if ([0,1,2,3,4].every(i => grid[i][i])) return true;
  if ([0,1,2,3,4].every(i => grid[i][4-i])) return true;

  return false;
}

function newCard(){
  document.getElementById("bingoMessage").style.display = "none";
  render(generate());
}

function resetMarks(){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    if(i===12){c.classList.add("marked");}
    else{c.classList.remove("marked");}
  });
}

newCard();
</script>

</body>
</html>
