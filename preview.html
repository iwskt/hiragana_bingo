<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiragana Bingo</title>
<style>
body {font-family: Arial, sans-serif; background:#f9f9f9; text-align:center; padding:20px;}
.board {display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-width:400px; margin:20px auto;}
.cell {border:2px solid #ccc; aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; position:relative;}
.cell.marked::after {content:""; position:absolute; width:70%; height:70%; border:5px solid red; border-radius:50%;}
button {margin:5px; padding:10px 16px; font-size:16px; cursor:pointer;}
.free {background:#eee;}
</style>
</head>
<body>

<h1>Hiragana Bingo</h1>
<p>Press "Start" to generate a random 5×5 bingo card.<br>Tap a cell to mark it.</p>

<button onclick="newCard()">Start</button>
<button onclick="resetMarks()">Reset Marks</button>

<div id="board" class="board"></div>

<script>
const kana = [
"あ","い","う","え","お",
"か","き","く","け","こ",
"さ","し","す","せ","そ",
"た","ち","つ","て","と",
"な","に","ぬ","ね","の",
"は","ひ","ふ","へ","ほ",
"ま","み","む","め","も",
"や","ゆ","よ",
"ら","り","る","れ","ろ",
"わ","を","ん",
"が","ぎ","ぐ","げ","ご",
"ざ","じ","ず","ぜ","ぞ",
"だ","ぢ","づ","で","ど",
"ば","び","ぶ","べ","ぼ",
"ぱ","ぴ","ぷ","ぺ","ぽ"
];

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function generate(){
  let picked = shuffle([...kana]).slice(0,24);
  let grid=[];
  let i=0;
  for(let r=0;r<5;r++){
    for(let c=0;c<5;c++){
      if(r===2 && c===2){
        grid.push({text:"FREE",free:true});
      }else{
        grid.push({text:picked[i],free:false});
        i++;
      }
    }
  }
  return grid;
}

function render(grid){
  const board=document.getElementById("board");
  board.innerHTML="";
  grid.forEach(cell=>{
    const div=document.createElement("div");
    div.className="cell"+(cell.free?" free marked":"");
    div.textContent=cell.text;
    if(!cell.free){
      div.onclick=()=>div.classList.toggle("marked");
    }
    board.appendChild(div);
  });
}

function newCard(){
  render(generate());
}

function resetMarks(){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    if(i===12){c.classList.add("marked");}
    else{c.classList.remove("marked");}
  });
}

newCard();
</script>

</body>
</html>
